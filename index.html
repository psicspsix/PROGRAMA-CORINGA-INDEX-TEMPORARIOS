<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Meus Atalhos</title>
    <style>
        /* ============================================================
           VARIÁVEIS (TEMA CLARO PADRÃO)
           ============================================================ */
        :root {
            --bg-body: #f5f7fa;
            --bg-gradient: linear-gradient(145deg, #f5f7fa 0%, #e9edf2 100%);
            --text-primary: #2c3e50;
            --text-secondary: #34495e;
            --text-muted: #7f8c8d;
            --card-bg: #ffffff;
            --card-border: rgba(0,0,0,0.02);
            --card-shadow: 0 8px 20px rgba(0,0,0,0.06);
            --card-shadow-hover: 0 12px 30px rgba(0,0,0,0.1);
            --input-bg: #ffffff;
            --input-border: #ccc;
            --input-focus: #3498db;
            --btn-primary: #3498db;
            --btn-primary-hover: #2980b9;
            --btn-danger: #e74c3c;
            --btn-danger-hover: #c0392b;
            --btn-success: #2ecc71;
            --btn-success-hover: #27ae60;
            --btn-edit: #f1c40f;
            --btn-edit-hover: #f39c12;
            --btn-find: #9b59b6;
            --btn-find-hover: #8e44ad;
            --modal-overlay: rgba(0,0,0,0.4);
            --modal-bg: #ffffff;
            --modal-shadow: 0 30px 60px rgba(0,0,0,0.3);
            --footer-color: #95a5a6;
        }

        /* ============================================================
           TEMA ESCURO (aplicado com a classe .dark-mode no body)
           ============================================================ */
        body.dark-mode {
            --bg-body: #1e1e2f;
            --bg-gradient: linear-gradient(145deg, #1e1e2f 0%, #2a2a3d 100%);
            --text-primary: #ecf0f1;
            --text-secondary: #bdc3c7;
            --text-muted: #95a5a6;
            --card-bg: #2c2c3e;
            --card-border: rgba(255,255,255,0.05);
            --card-shadow: 0 8px 20px rgba(0,0,0,0.4);
            --card-shadow-hover: 0 12px 30px rgba(0,0,0,0.6);
            --input-bg: #3a3a4e;
            --input-border: #555;
            --input-focus: #5b9bd5;
            --btn-primary: #5b9bd5;
            --btn-primary-hover: #4a8bc2;
            --btn-danger: #e74c3c;
            --btn-danger-hover: #c0392b;
            --btn-success: #2ecc71;
            --btn-success-hover: #27ae60;
            --btn-edit: #f1c40f;
            --btn-edit-hover: #f39c12;
            --btn-find: #b07cc6;
            --btn-find-hover: #9b59b6;
            --modal-overlay: rgba(0,0,0,0.7);
            --modal-bg: #2c2c3e;
            --modal-shadow: 0 30px 60px rgba(0,0,0,0.7);
            --footer-color: #7f8c8d;
        }

        /* ============================================================
           ESTILOS GERAIS
           ============================================================ */
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }
        body {
            background: var(--bg-gradient);
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            padding: 40px 20px;
            transition: background 0.3s, color 0.3s;
            color: var(--text-primary);
        }

        /* Cabeçalho com título e botão de tema */
        .header {
            display: flex;
            align-items: center;
            gap: 20px;
            margin-bottom: 30px;
            flex-wrap: wrap;
            justify-content: center;
        }
        .header h1 {
            font-weight: 300;
            color: var(--text-primary);
            letter-spacing: 1px;
            margin: 0;
        }
        .theme-toggle {
            background: var(--card-bg);
            border: none;
            border-radius: 40px;
            padding: 8px 16px;
            font-size: 20px;
            cursor: pointer;
            box-shadow: var(--card-shadow);
            transition: background 0.2s, transform 0.1s;
            display: flex;
            align-items: center;
            gap: 8px;
            color: var(--text-primary);
        }
        .theme-toggle:hover {
            transform: scale(1.05);
        }
        .theme-toggle:active {
            transform: scale(0.95);
        }
        .theme-toggle span {
            font-size: 14px;
            font-weight: 500;
        }

        .container {
            max-width: 1200px;
            width: 100%;
        }

        /* ============================================================
           BARRA DE FERRAMENTAS (todos os botões estarão aqui)
           ============================================================ */
        .toolbar {
            display: flex;
            gap: 12px;
            flex-wrap: wrap;
            margin-bottom: 30px;
            justify-content: center;
        }
        .toolbar input {
            padding: 10px 16px;
            border: 1px solid var(--input-border);
            border-radius: 8px;
            font-size: 15px;
            flex: 1 1 200px;
            background: var(--input-bg);
            color: var(--text-primary);
            transition: 0.2s;
        }
        .toolbar input:focus {
            border-color: var(--input-focus);
            outline: none;
            box-shadow: 0 0 0 3px rgba(52, 152, 219, 0.2);
        }
        .toolbar button {
            padding: 10px 22px;
            border: none;
            border-radius: 8px;
            color: white;
            font-weight: 600;
            font-size: 15px;
            cursor: pointer;
            transition: background 0.2s, transform 0.1s;
        }
        .toolbar button:active {
            transform: scale(0.96);
        }
        .toolbar .btn-add {
            background: var(--btn-primary);
        }
        .toolbar .btn-add:hover {
            background: var(--btn-primary-hover);
        }
        .toolbar .btn-danger {
            background: var(--btn-danger);
        }
        .toolbar .btn-danger:hover {
            background: var(--btn-danger-hover);
        }
        .toolbar .btn-success {
            background: var(--btn-success);
        }
        .toolbar .btn-success:hover {
            background: var(--btn-success-hover);
        }
        .toolbar .btn-find {
            background: var(--btn-find);
        }
        .toolbar .btn-find:hover {
            background: var(--btn-find-hover);
        }

        /* ============================================================
           GRID DE ATALHOS
           ============================================================ */
        .grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(150px, 1fr));
            gap: 20px;
        }

        .card {
            background: var(--card-bg);
            border-radius: 16px;
            padding: 20px 12px;
            box-shadow: var(--card-shadow);
            text-align: center;
            transition: transform 0.2s, box-shadow 0.2s, background 0.3s;
            cursor: grab;
            position: relative;
            display: flex;
            flex-direction: column;
            align-items: center;
            border: 1px solid var(--card-border);
        }
        .card:hover {
            transform: translateY(-4px);
            box-shadow: var(--card-shadow-hover);
        }
        .card:active {
            cursor: grabbing;
        }
        .card .icon {
            font-size: 36px;
            margin-bottom: 8px;
            line-height: 1;
        }
        .card .title {
            font-weight: 600;
            font-size: 14px;
            color: var(--text-primary);
            word-break: break-word;
            margin-bottom: 4px;
        }
        .card .url {
            font-size: 11px;
            color: var(--text-muted);
            word-break: break-all;
            max-width: 100%;
            overflow: hidden;
            text-overflow: ellipsis;
            white-space: nowrap;
        }
        .card .actions {
            margin-top: 12px;
            display: flex;
            gap: 8px;
            flex-wrap: wrap;
            justify-content: center;
        }
        .card .actions button {
            border: none;
            background: #ecf0f1;
            padding: 4px 10px;
            border-radius: 30px;
            font-size: 12px;
            cursor: pointer;
            transition: 0.2s;
            color: #2c3e50;
        }
        body.dark-mode .card .actions button {
            background: #3a3a4e;
            color: #ecf0f1;
        }
        .card .actions .edit-btn {
            background: var(--btn-edit);
            color: #2c3e50;
        }
        .card .actions .edit-btn:hover {
            background: var(--btn-edit-hover);
        }
        .card .actions .del-btn {
            background: var(--btn-danger);
            color: white;
        }
        .card .actions .del-btn:hover {
            background: var(--btn-danger-hover);
        }
        .card .drag-handle {
            position: absolute;
            top: 6px;
            right: 10px;
            font-size: 14px;
            color: var(--text-muted);
            cursor: grab;
            user-select: none;
        }
        .card .drag-handle:active {
            cursor: grabbing;
        }

        .empty {
            text-align: center;
            color: var(--text-muted);
            font-size: 18px;
            padding: 60px 0;
            grid-column: 1 / -1;
        }

        /* ============================================================
           MODAL DE EDIÇÃO
           ============================================================ */
        .modal-overlay {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: var(--modal-overlay);
            backdrop-filter: blur(4px);
            display: none;
            align-items: center;
            justify-content: center;
            z-index: 999;
        }
        .modal-overlay.active {
            display: flex;
        }
        .modal {
            background: var(--modal-bg);
            padding: 30px 35px;
            border-radius: 20px;
            max-width: 420px;
            width: 90%;
            box-shadow: var(--modal-shadow);
            color: var(--text-primary);
        }
        .modal h2 {
            margin-bottom: 20px;
            font-weight: 400;
            color: var(--text-primary);
        }
        .modal label {
            display: block;
            font-size: 14px;
            font-weight: 600;
            color: var(--text-secondary);
            margin: 12px 0 4px;
        }
        .modal input {
            width: 100%;
            padding: 10px 14px;
            border: 1px solid var(--input-border);
            border-radius: 8px;
            font-size: 15px;
            background: var(--input-bg);
            color: var(--text-primary);
        }
        .modal input:focus {
            border-color: var(--input-focus);
            outline: none;
        }
        .modal .modal-actions {
            display: flex;
            gap: 12px;
            margin-top: 24px;
            justify-content: flex-end;
        }
        .modal .modal-actions button {
            padding: 8px 24px;
            border: none;
            border-radius: 30px;
            font-weight: 600;
            cursor: pointer;
            transition: 0.2s;
        }
        .modal .modal-actions .save-btn {
            background: var(--btn-success);
            color: white;
        }
        .modal .modal-actions .save-btn:hover {
            background: var(--btn-success-hover);
        }
        .modal .modal-actions .cancel-btn {
            background: #ecf0f1;
            color: #2c3e50;
        }
        body.dark-mode .modal .modal-actions .cancel-btn {
            background: #3a3a4e;
            color: #ecf0f1;
        }
        .modal .modal-actions .cancel-btn:hover {
            background: #d5dbdb;
        }
        body.dark-mode .modal .modal-actions .cancel-btn:hover {
            background: #4a4a5e;
        }

        /* ============================================================
           RODAPÉ
           ============================================================ */
        footer {
            margin-top: 40px;
            font-size: 13px;
            color: var(--footer-color);
        }
        footer a {
            color: var(--btn-primary);
            text-decoration: none;
        }
        footer a:hover {
            text-decoration: underline;
        }

        /* ============================================================
           RESPONSIVIDADE
           ============================================================ */
        @media (max-width: 500px) {
            .grid {
                grid-template-columns: repeat(auto-fill, minmax(120px, 1fr));
                gap: 15px;
            }
            .card .icon {
                font-size: 28px;
            }
            .header {
                gap: 12px;
            }
            .theme-toggle span {
                display: none;
            }
        }
    </style>
</head>
<body>

    <!-- ========== CABEÇALHO ========== -->
    <div class="header">
        <h1>🔖 Meus Atalhos</h1>
        <button class="theme-toggle" id="themeToggle" aria-label="Alternar tema">
            <span id="themeIcon">🌙</span>
            <span id="themeLabel">Escuro</span>
        </button>
    </div>

    <div class="container">
        <!-- ========== BARRA DE FERRAMENTAS ========== -->
        <div class="toolbar">
            <input type="text" id="newTitle" placeholder="Nome (ex: GitHub)" />
            <input type="text" id="newUrl" placeholder="URL (ex: https://github.com)" />
            <button id="addBtn" class="btn-add">➕ Adicionar</button>
            <button id="resetBtn" class="btn-danger">🗑️ Resetar todos</button>
            <button id="exportBtn" class="btn-success">📤 Exportar</button>
            <button id="importBtn" class="btn-success">📥 Importar</button>
            <input type="file" id="fileInput" accept=".json" style="display:none" />
            <!-- NOVO BOTÃO FIND IN PAGE -->
            <button id="findBtn" class="btn-find">🔍 Find in Page</button>
        </div>

        <!-- ========== GRID DE ATALHOS ========== -->
        <div class="grid" id="shortcutGrid">
            <!-- Os cards serão inseridos aqui via JavaScript -->
        </div>
    </div>

    <!-- ========== MODAL DE EDIÇÃO ========== -->
    <div class="modal-overlay" id="editModal">
        <div class="modal">
            <h2>✏️ Editar atalho</h2>
            <label for="editTitle">Nome</label>
            <input type="text" id="editTitle" />
            <label for="editUrl">URL</label>
            <input type="text" id="editUrl" />
            <div class="modal-actions">
                <button class="cancel-btn" id="cancelEditBtn">Cancelar</button>
                <button class="save-btn" id="saveEditBtn">Salvar</button>
            </div>
        </div>
    </div>

    <footer>
        💾 Os dados são salvos localmente no seu navegador (localStorage).
    </footer>

    <script>
        (function() {
            // =========================================================
            // 1. CONFIGURAÇÃO INICIAL
            // =========================================================
            let shortcuts = [];
            let editingIndex = -1;

            // =========================================================
            // 2. ELEMENTOS DOM
            // =========================================================
            const grid = document.getElementById('shortcutGrid');
            const newTitle = document.getElementById('newTitle');
            const newUrl = document.getElementById('newUrl');
            const addBtn = document.getElementById('addBtn');
            const resetBtn = document.getElementById('resetBtn');
            const exportBtn = document.getElementById('exportBtn');
            const importBtn = document.getElementById('importBtn');
            const fileInput = document.getElementById('fileInput');
            const findBtn = document.getElementById('findBtn');

            const modal = document.getElementById('editModal');
            const editTitle = document.getElementById('editTitle');
            const editUrl = document.getElementById('editUrl');
            const saveEditBtn = document.getElementById('saveEditBtn');
            const cancelEditBtn = document.getElementById('cancelEditBtn');

            // =========================================================
            // 3. TEMA (CLARO/ESCURO) – com persistência
            // =========================================================
            const themeToggle = document.getElementById('themeToggle');
            const themeIcon = document.getElementById('themeIcon');
            const themeLabel = document.getElementById('themeLabel');

            function applyTheme(theme) {
                if (theme === 'dark') {
                    document.body.classList.add('dark-mode');
                    themeIcon.textContent = '☀️';
                    themeLabel.textContent = 'Claro';
                } else {
                    document.body.classList.remove('dark-mode');
                    themeIcon.textContent = '🌙';
                    themeLabel.textContent = 'Escuro';
                }
                try {
                    localStorage.setItem('theme', theme);
                } catch (e) { /* localStorage indisponível */ }
            }

            function toggleTheme() {
                const isDark = document.body.classList.contains('dark-mode');
                applyTheme(isDark ? 'light' : 'dark');
            }

            // Carregar tema salvo
            let savedTheme = 'light';
            try {
                savedTheme = localStorage.getItem('theme') || 'light';
            } catch (e) {}
            applyTheme(savedTheme);

            // Evento do botão
            if (themeToggle) {
                themeToggle.addEventListener('click', toggleTheme);
            } else {
                console.error('Botão de tema não encontrado!');
            }

            // =========================================================
            // 4. PERSISTÊNCIA DOS ATALHOS (localStorage)
            // =========================================================
            function loadData() {
                const stored = localStorage.getItem('myShortcuts');
                if (stored) {
                    try {
                        shortcuts = JSON.parse(stored);
                    } catch (e) {
                        shortcuts = [];
                    }
                } else {
                    // Dados iniciais de exemplo
                    shortcuts = [
                        { title: 'Google', url: 'https://www.google.com', icon: '🌐' },
                        { title: 'YouTube', url: 'https://www.youtube.com', icon: '▶️' },
                        { title: 'GitHub', url: 'https://github.com', icon: '🐙' },
                        { title: 'Gmail', url: 'https://mail.google.com', icon: '📧' },
                    ];
                }
                shortcuts = shortcuts.map(s => ({ ...s, icon: s.icon || '🔗' }));
                saveData();
            }

            function saveData() {
                localStorage.setItem('myShortcuts', JSON.stringify(shortcuts));
                render();
            }

            // =========================================================
            // 5. RENDERIZAÇÃO DOS CARDS
            // =========================================================
            function render() {
                if (shortcuts.length === 0) {
                    grid.innerHTML = `<div class="empty">Nenhum atalho. Adicione um!</div>`;
                    return;
                }

                let html = '';
                shortcuts.forEach((item, index) => {
                    html += `
                        <div class="card" draggable="true" data-index="${index}">
                            <div class="drag-handle" title="Arrastar para reordenar">⠿</div>
                            <div class="icon">${item.icon || '🔗'}</div>
                            <div class="title">${escapeHtml(item.title)}</div>
                            <div class="url" title="${escapeHtml(item.url)}">${escapeHtml(item.url)}</div>
                            <div class="actions">
                                <button class="edit-btn" data-index="${index}">✏️ Editar</button>
                                <button class="del-btn" data-index="${index}">🗑️</button>
                            </div>
                        </div>
                    `;
                });
                grid.innerHTML = html;

                // Eventos dos botões de editar/remover
                grid.querySelectorAll('.edit-btn').forEach(btn => {
                    btn.addEventListener('click', function(e) {
                        e.stopPropagation();
                        const idx = parseInt(this.dataset.index);
                        openEditModal(idx);
                    });
                });

                grid.querySelectorAll('.del-btn').forEach(btn => {
                    btn.addEventListener('click', function(e) {
                        e.stopPropagation();
                        const idx = parseInt(this.dataset.index);
                        if (confirm(`Deseja remover o atalho "${shortcuts[idx].title}"?`)) {
                            shortcuts.splice(idx, 1);
                            saveData();
                        }
                    });
                });

                // Drag & drop para reordenar
                const cards = grid.querySelectorAll('.card');
                cards.forEach(card => {
                    card.addEventListener('dragstart', handleDragStart);
                    card.addEventListener('dragend', handleDragEnd);
                    card.addEventListener('dragover', handleDragOver);
                    card.addEventListener('dragenter', handleDragEnter);
                    card.addEventListener('dragleave', handleDragLeave);
                    card.addEventListener('drop', handleDrop);
                });
            }

            // =========================================================
            // 6. DRAG & DROP
            // =========================================================
            let draggedIndex = null;

            function handleDragStart(e) {
                draggedIndex = parseInt(this.dataset.index);
                this.style.opacity = '0.5';
                e.dataTransfer.effectAllowed = 'move';
                e.dataTransfer.setData('text/plain', draggedIndex);
            }

            function handleDragEnd(e) {
                this.style.opacity = '';
                grid.querySelectorAll('.card').forEach(c => c.style.border = '');
            }

            function handleDragOver(e) {
                e.preventDefault();
                e.dataTransfer.dropEffect = 'move';
            }

            function handleDragEnter(e) {
                e.preventDefault();
                this.style.border = '2px dashed var(--input-focus)';
            }

            function handleDragLeave(e) {
                this.style.border = '';
            }

            function handleDrop(e) {
                e.preventDefault();
                this.style.border = '';
                const sourceIdx = parseInt(e.dataTransfer.getData('text/plain'));
                const targetIdx = parseInt(this.dataset.index);
                if (sourceIdx !== targetIdx && !isNaN(sourceIdx) && !isNaN(targetIdx)) {
                    const [removed] = shortcuts.splice(sourceIdx, 1);
                    shortcuts.splice(targetIdx, 0, removed);
                    saveData();
                }
                draggedIndex = null;
            }

            // =========================================================
            // 7. MODAL DE EDIÇÃO
            // =========================================================
            function openEditModal(index) {
                editingIndex = index;
                const item = shortcuts[index];
                editTitle.value = item.title || '';
                editUrl.value = item.url || '';
                modal.classList.add('active');
                editTitle.focus();
            }

            function closeEditModal() {
                modal.classList.remove('active');
                editingIndex = -1;
            }

            function saveEdit() {
                const title = editTitle.value.trim();
                const url = editUrl.value.trim();
                if (!title || !url) {
                    alert('Preencha nome e URL.');
                    return;
                }
                shortcuts[editingIndex].title = title;
                shortcuts[editingIndex].url = url;
                shortcuts[editingIndex].icon = getIconForTitle(title);
                saveData();
                closeEditModal();
            }

            // =========================================================
            // 8. ÍCONE AUTOMÁTICO
            // =========================================================
            function getIconForTitle(title) {
                const emojiMap = {
                    'google': '🌐',
                    'youtube': '▶️',
                    'github': '🐙',
                    'gmail': '📧',
                    'facebook': '📘',
                    'twitter': '🐦',
                    'instagram': '📷',
                    'linkedin': '💼',
                    'reddit': '🤖',
                    'amazon': '🛒',
                    'netflix': '🎬',
                    'spotify': '🎵',
                    'whatsapp': '💬',
                    'telegram': '✈️',
                    'wikipedia': '📚',
                    'stackoverflow': '📘',
                    'medium': '✍️',
                };
                const lower = title.toLowerCase();
                for (let [key, emoji] of Object.entries(emojiMap)) {
                    if (lower.includes(key)) return emoji;
                }
                const first = title.charAt(0).toUpperCase();
                if (first.match(/[A-Z]/)) return first;
                return '🔗';
            }

            // =========================================================
            // 9. UTILITÁRIOS
            // =========================================================
            function escapeHtml(text) {
                if (!text) return '';
                const div = document.createElement('div');
                div.textContent = text;
                return div.innerHTML;
            }

            // =========================================================
            // 10. AÇÕES DA BARRA DE FERRAMENTAS
            // =========================================================
            function addShortcut() {
                const title = newTitle.value.trim();
                const url = newUrl.value.trim();
                if (!title || !url) {
                    alert('Preencha nome e URL.');
                    return;
                }
                if (!url.startsWith('http://') && !url.startsWith('https://')) {
                    alert('A URL deve começar com http:// ou https://');
                    return;
                }
                const icon = getIconForTitle(title);
                shortcuts.push({ title, url, icon });
                saveData();
                newTitle.value = '';
                newUrl.value = '';
                newTitle.focus();
            }

            function resetAll() {
                if (confirm('Tem certeza que deseja remover TODOS os atalhos?')) {
                    shortcuts = [];
                    saveData();
                }
            }

            function exportData() {
                const data = JSON.stringify(shortcuts, null, 2);
                const blob = new Blob([data], { type: 'application/json' });
                const a = document.createElement('a');
                a.href = URL.createObjectURL(blob);
                a.download = 'meus_atalhos.json';
                document.body.appendChild(a);
                a.click();
                document.body.removeChild(a);
                URL.revokeObjectURL(a.href);
            }

            function importData(file) {
                const reader = new FileReader();
                reader.onload = function(e) {
                    try {
                        const data = JSON.parse(e.target.result);
                        if (Array.isArray(data)) {
                            const valid = data.every(item => item.title && item.url);
                            if (!valid) {
                                alert('Arquivo inválido: cada item deve ter "title" e "url".');
                                return;
                            }
                            if (confirm('Isso substituirá todos os atalhos atuais. Continuar?')) {
                                shortcuts = data.map(s => ({ ...s, icon: s.icon || getIconForTitle(s.title) }));
                                saveData();
                            }
                        } else {
                            alert('Arquivo inválido: espera-se um array.');
                        }
                    } catch (err) {
                        alert('Erro ao ler o arquivo: ' + err.message);
                    }
                };
                reader.readAsText(file);
                fileInput.value = '';
            }

            importBtn.addEventListener('click', () => fileInput.click());
            fileInput.addEventListener('change', (e) => {
                if (e.target.files.length > 0) {
                    importData(e.target.files[0]);
                }
            });

            saveEditBtn.addEventListener('click', saveEdit);
            cancelEditBtn.addEventListener('click', closeEditModal);
            modal.addEventListener('click', function(e) {
                if (e.target === this) closeEditModal();
            });
            document.addEventListener('keydown', function(e) {
                if (e.key === 'Escape' && modal.classList.contains('active')) {
                    closeEditModal();
                }
                if (e.key === 'Enter' && modal.classList.contains('active')) {
                    saveEdit();
                }
            });
